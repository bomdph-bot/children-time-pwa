services:
  app:
    build: .
    container_name: children-time-pwa
    ports:
      - "3000:3000"
    volumes:
      - children-data:/app/backend/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/backend/data/children.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  children-data:
    driver: local
