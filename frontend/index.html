<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="screen-orientation" content="landscape" />
  <meta name="format-detection" content="telephone=no" />
  <title>儿童时间管理</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 星空背景装饰 -->
  <div class="stars" aria-hidden="true"></div>
  <div class="moon" aria-hidden="true"></div>

  <div class="app-container">
    <!-- 顶部孩子切换区 -->
    <header class="child-selector">
      <div class="child-avatar active" data-child="1" role="button" tabindex="0" aria-label="大宝">
        <div class="avatar-ring">
          <div class="avatar-inner baby-emoji">👧</div>
        </div>
        <span class="child-name">大宝</span>
      </div>
      <div class="child-avatar" data-child="2" role="button" tabindex="0" aria-label="二宝">
        <div class="avatar-ring">
          <div class="avatar-inner baby-emoji">👦</div>
        </div>
        <span class="child-name">二宝</span>
      </div>
      <div class="child-avatar" data-child="3" role="button" tabindex="0" aria-label="三宝">
        <div class="avatar-ring">
          <div class="avatar-inner baby-emoji">👧</div>
        </div>
        <span class="child-name">三宝</span>
      </div>
      <div class="child-avatar" data-child="4" role="button" tabindex="0" aria-label="小宝">
        <div class="avatar-ring">
          <div class="avatar-inner baby-emoji">👶</div>
        </div>
        <span class="child-name">小宝</span>
      </div>
    </header>

    <!-- 当前时间卡片 -->
    <div class="time-card">
      <div class="time-display" id="currentTime">--:--:--</div>
      <div class="date-display" id="currentDate">----年--月--日</div>
    </div>

    <!-- 主时间条区域 -->
    <main class="timeline-area">
      <div class="timeline-scroll">
        <div class="timeline-header">
          <span class="timeline-label">🕐 时间轴</span>
          <span class="timeline-hint">点击任务标记完成</span>
        </div>

        <div class="timeline-track" id="timelineTrack">
          <!-- 时间刻度 -->
          <div class="timeline-ruler">
            <span class="ruler-start">07:00</span>
            <div class="ruler-ticks" id="rulerTicks"></div>
            <span class="ruler-end">21:00</span>
          </div>

          <!-- 任务与自由时间条 -->
          <div class="timeline-row" id="timelineRow">
            <!-- 动态生成任务块和自由时间块 -->
          </div>
        </div>

        <!-- 图例 -->
        <div class="legend">
          <div class="legend-title">📋 任务图例</div>
          <div class="legend-items">
            <div class="legend-item">
              <span class="legend-dot" style="background:#FF6B9D"></span>
              <span>学习</span>
            </div>
            <div class="legend-item">
              <span class="legend-dot" style="background:#FFD93D"></span>
              <span>运动</span>
            </div>
            <div class="legend-item">
              <span class="legend-dot" style="background:#6BCB77"></span>
              <span>休息</span>
            </div>
            <div class="legend-item">
              <span class="legend-dot" style="background:#4D96FF"></span>
              <span>自由</span>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- 超时任务区域 -->
    <section class="overtime-section" id="overtimeSection">
      <div class="section-title">⏰ 超时任务</div>
      <div class="overtime-list" id="overtimeList">
        <!-- 超时任务示例 -->
        <div class="overtime-item">
          <span class="overtime-dot"></span>
          <span class="overtime-text">数学作业 - 超时 15 分钟</span>
        </div>
      </div>
    </section>

    <!-- 完成鼓励区 -->
    <section class="encourage-section" id="encourageSection">
      <div class="encourage-bubble">
        <span class="encourage-emoji">🌟</span>
        <span class="encourage-text" id="encourageText">太棒了！继续保持！</span>
        <span class="encourage-emoji">🌟</span>
      </div>
    </section>

    <!-- 家长入口 -->
    <button class="parent-btn" id="parentBtn" aria-label="家长入口">
      <span>👨‍👩‍👧</span>
      <span class="parent-btn-text">家长</span>
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
